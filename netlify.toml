[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Etsy Calculator subpath — proxies to standalone Netlify site
# IMPORTANT: 301 redirect must come BEFORE the proxy splat rule —
# Netlify's /etsy/* matches /etsy (empty splat), so without this ordering
# the proxy fires before the redirect and the URL stays without trailing
# slash, breaking relative paths in the proxied HTML.
[[redirects]]
  from = "/etsy"
  to = "/etsy/"
  status = 301
  force = true

[[redirects]]
  from = "/etsy/*"
  to = "https://etsypricing.netlify.app/:splat"
  status = 200
  force = true


[build.environment]
  NODE_VERSION = "18.19.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
