[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Etsy Calculator subpath — proxies to standalone Netlify site
# Both /etsy and /etsy/* proxy directly. Always link to /etsy/ (with
# trailing slash) so relative paths in the proxied HTML resolve correctly.
[[redirects]]
  from = "/etsy/*"
  to = "https://etsypricing.netlify.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/etsy"
  to = "https://etsypricing.netlify.app/"
  status = 200
  force = true


[build.environment]
  NODE_VERSION = "18.19.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
